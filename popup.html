<!DOCTYPE html>
<html>
<head>
<style>
  body { width: 280px; padding: 12px; font-family: sans-serif; font-size: 13px; color: #333; }
  h3 { margin: 0 0 12px; font-size: 15px; }
  .section { margin-bottom: 12px; }
  .domain { font-size: 12px; color: #555; padding: 2px 0; }
  button { color: #fff; border: none; border-radius: 4px; padding: 8px 12px; cursor: pointer; width: 100%; margin-bottom: 6px; }
  .reset-btn { background: #c0392b; }
  .reset-btn:hover { background: #a93226; }
  .empty { color: #888; font-style: italic; }
  label { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
  input[type="range"] { flex: 1; }
  .toggle { cursor: pointer; padding: 6px 10px; background: #555; color: #fff; border-radius: 4px; text-align: center; }
  .toggle.active { background: #047c9d; }
</style>
</head>
<body>
<h3>Mastir</h3>
<div class="section">
  <label>Blur: <input type="range" id="blur-slider" min="0" max="20" value="0"> <span id="blur-val">0</span></label>
  <div class="toggle" id="gray-toggle">Grayscale: Off</div>
</div>
<div class="section">
  <b>CSP overrides:</b>
  <div id="domains"></div>
</div>
<button class="reset-btn" id="reset">Reset all CSP overrides</button>
<script src="popup.js"></script>
</body>
</html>
